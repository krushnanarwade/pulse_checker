name: Deploy to Render - Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-before-production:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      
      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v
        env:
          ENVIRONMENT: development
          DATABASE_URL: sqlite:///./test.db

  deploy-backend-production:
    runs-on: ubuntu-latest
    needs: test-before-production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy Backend to Render
        run: |
          curl https://api.render.com/deploy/srv-${{ secrets.RENDER_PRODUCTION_BACKEND_SERVICE_ID }}?key=${{ secrets.RENDER_DEPLOY_KEY }}
        continue-on-error: true
      
      - name: Notify Deployment
        run: |
          echo "Backend production deployment triggered"

  deploy-frontend-production:
    runs-on: ubuntu-latest
    needs: deploy-backend-production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy Frontend to Render
        run: |
          curl https://api.render.com/deploy/srv-${{ secrets.RENDER_PRODUCTION_FRONTEND_SERVICE_ID }}?key=${{ secrets.RENDER_DEPLOY_KEY }}
        continue-on-error: true
      
      - name: Notify Deployment
        run: |
          echo "Frontend production deployment triggered"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          body: Production deployment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Slack Notification Success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production Deployment Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Production Deployment Successful*\nBackend & Frontend deployed to production\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      
      - name: Slack Notification Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Production Deployment Failed*\nCheck the logs for details\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
